name: Keep Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  stay-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run keep-alive
        env:
          SECRET: ${{ secrets.KEEP_ALIVE }}
        run: |
          echo "Secret verified: $SECRET"
          echo "AR, I am still alive... Noor ki jaan"
          sleep 30
